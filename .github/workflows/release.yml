name: Release Build

on:
  release:
    types: [published]

jobs:
  build-android:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Gradle Wrapper
        uses: gradle/wrapper-action@v3

      - name: Build shared module
        run: ./gradlew :shared:compileDebugKotlinAndroid --no-daemon

      - name: Build Android app
        run: ./gradlew :androidApp:app:assembleRelease --no-daemon

      - name: Rename APK
        run: cp androidApp/app/build/outputs/apk/release/app-release.apk mandatory-tracker.apk

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: mandatory-tracker.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Generate Xcode project
        run: cd iosApp && xcodegen generate

      - name: Build iOS
        run: |
          cd iosApp
          xcodebuild -project iosApp.xcodeproj -scheme ValorantTracker -configuration Release -destination 'platform=iOS Simulator,name=iPhone 16' build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
        env:
          CI: true

      - name: Create ZIP for iOS
        run: |
          cd iosApp
          mkdir -p payload
          cp -r build/Release-iphonesimulator/ValorantTracker.app payload/
          cd payload && zip -r ../ValorantTracker.ipa .
          cd ..

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: iosApp/ValorantTracker.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
