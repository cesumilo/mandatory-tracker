name: Release Build

on:
  release:
    types: [published]

jobs:
  build-android:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.9-bin.zip -o gradle.zip
          unzip -q gradle.zip
          echo "./gradle/bin/gradle" >> $GITHUB_PATH

      - name: Build shared module
        run: ./gradlew :shared:compileDebugKotlinAndroid --no-daemon

      - name: Build Android app
        run: ./gradlew :androidApp:app:assembleRelease --no-daemon

      - name: Rename APK
        run: cp androidApp/app/build/outputs/apk/release/app-release.apk mandatory-tracker.apk

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: mandatory-tracker.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd iosApp && xcodegen generate

      - name: Note
        run: echo "iOS build requires development team. Build locally with Xcode."
