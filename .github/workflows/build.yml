name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-shared:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        run: |
          if [ ! -f "./gradlew" ]; then
            curl -sL https://services.gradle.org/distributions/gradle-8.9-bin.zip -o gradle.zip
            unzip -q gradle.zip
            mv gradle-8.9 gradle
          fi
          echo "./gradle/bin/gradle" >> $GITHUB_PATH

      - name: Build shared module
        run: ./gradlew :shared:compileDebugKotlinAndroid --no-daemon

  build-android:
    runs-on: macos-latest
    needs: build-shared
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        run: |
          if [ ! -f "./gradlew" ]; then
            curl -sL https://services.gradle.org/distributions/gradle-8.9-bin.zip -o gradle.zip
            unzip -q gradle.zip
            mv gradle-8.9 gradle
          fi
          echo "./gradle/bin/gradle" >> $GITHUB_PATH

      - name: Build Android app
        run: ./gradlew :androidApp:app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: androidApp/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd iosApp && xcodegen generate

      - name: Build iOS
        run: cd iosApp && xcodebuild -project iosApp.xcodeproj -scheme ValorantTracker -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 16' build
        env:
          CI: true
