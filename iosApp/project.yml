name: iosApp
options:
  bundleIdPrefix: com.valoranttracker
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  ValorantTracker:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - App/Sources
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        PRODUCT_BUNDLE_IDENTIFIER: com.valoranttracker.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: App/Sources/ValorantTracker.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.valoranttracker.app
    dependencies:
      - target: ValorantWidgetExtension

  ValorantWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - WidgetExtension/Sources
    settings:
      base:
        INFOPLIST_KEY_CFBundleDisplayName: "Valorant Match"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        PRODUCT_BUNDLE_IDENTIFIER: com.valoranttracker.app.widget
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
    entitlements:
      path: WidgetExtension/Sources/ValorantWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.valoranttracker.app