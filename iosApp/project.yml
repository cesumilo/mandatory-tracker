name: iosApp
options:
  bundleIdPrefix: com.valoranttracker
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  ValorantTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - App/Sources
    info:
      path: App/Sources/Info.plist
      properties:
        CFBundleDisplayName: "Mandatory"
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - valoranttracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.valoranttracker.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: App/Sources/ValorantTracker.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.valoranttracker.app
    dependencies:
      - target: ValorantWidgetExtension

  ValorantWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - WidgetExtension/Sources
    info:
      path: WidgetExtension/Sources/Info.plist
      properties:
        CFBundleDisplayName: "Valorant Match"
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.valoranttracker.app.widget
        SKIP_INSTALL: YES
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
    entitlements:
      path: WidgetExtension/Sources/ValorantWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.valoranttracker.app

schemes:
  ValorantTracker:
    build:
      targets:
        ValorantTracker: all
        ValorantWidgetExtension: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release